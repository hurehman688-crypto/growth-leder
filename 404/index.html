<!DOCTYPE html><html lang="en" class="__variable_1e35df __variable_efafc1 __variable_ba5569"><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/><link rel="stylesheet" href="/_next/static/css/282d7a4ec2eea322.css?v=1.1" data-precedence="next"/><link rel="stylesheet" href="/_next/static/css/c7e1f430b78fdc37.css?v=1.1" data-precedence="next"/><link rel="stylesheet" href="/_next/static/css/107be5fca64d73a5.css?v=1.1" data-precedence="next"/><link rel="preload" as="script" fetchPriority="low" href="/_next/static/chunks/webpack-428d0c5e1a83e29e.js"/>                      <script>
    document.addEventListener('DOMContentLoaded', () => {
        // 1. Mobile Menu Logic
        const menuBtn = document.querySelector('button[aria-label="Toggle menu"]');
        const mobileNav = document.querySelector('nav.fixed.top-0.right-0.h-full.w-80');
        if (menuBtn && mobileNav) {
            const closeBtn = mobileNav.querySelector('button');
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] hidden';
            document.body.appendChild(overlay);

            const toggleMenu = () => {
                const isClosed = mobileNav.classList.contains('translate-x-full');
                mobileNav.classList.toggle('translate-x-full', !isClosed);
                mobileNav.classList.toggle('translate-x-0', isClosed);
                overlay.classList.toggle('hidden', !isClosed);
                document.body.style.overflow = isClosed ? 'hidden' : '';
            };

            menuBtn.addEventListener('click', toggleMenu);
            if (closeBtn) closeBtn.addEventListener('click', toggleMenu);
            overlay.addEventListener('click', toggleMenu);
            mobileNav.querySelectorAll('a').forEach(link => link.addEventListener('click', toggleMenu));
        }

        // 2. Reveal Animations & Counters
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    if (entry.target.classList.contains('js-counter')) animateCounter(entry.target);
                    revealObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.15 });

        document.querySelectorAll('.reveal-text, .js-counter').forEach(el => revealObserver.observe(el));

        function animateCounter(el) {
            const target = parseInt(el.getAttribute('data-target'));
            let current = 0;
            const increment = target / 50;
            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    el.textContent = target;
                    clearInterval(timer);
                } else {
                    el.textContent = Math.floor(current);
                }
            }, 30);
        }

        // 3. 3D Tilt Effect
        document.querySelectorAll('.tilt-card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = (e.clientX - rect.left - rect.width/2) / 10;
                const y = (e.clientY - rect.top - rect.height/2) / -10;
                card.style.transform = `perspective(1000px) rotateX(${y}deg) rotateY(${x}deg) scale3d(1.02, 1.02, 1.02)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)';
            });
        });

        // 4. Services Carousel
        const track = document.getElementById('services-track');
        if (track) {
            const slides = document.querySelectorAll('.services-slide');
            const dots = document.querySelectorAll('.carousel-dot');
            const prevBtn = document.querySelector('.carousel-prev');
            const nextBtn = document.querySelector('.carousel-next');
            let currentIndex = 0;

            const updateCarousel = (index) => {
                currentIndex = (index + slides.length) % slides.length;
                track.style.transform = `translateX(-${currentIndex * 100}%)`;
                slides.forEach((s, i) => s.classList.toggle('active', i === currentIndex));
                dots.forEach((d, i) => d.classList.toggle('active', i === currentIndex));
            };

            if (nextBtn) nextBtn.addEventListener('click', () => updateCarousel(currentIndex + 1));
            if (prevBtn) prevBtn.addEventListener('click', () => updateCarousel(currentIndex - 1));
            dots.forEach((dot, i) => dot.addEventListener('click', () => updateCarousel(i)));
            setInterval(() => updateCarousel(currentIndex + 1), 5000);
        }

        // 5. Newsletter Handler
        window.handleNewsletterSubmit = (e) => {
            e.preventDefault();
            const msg = document.getElementById('newsletter-msg');
            if (msg) msg.classList.remove('hidden');
            e.target.reset();
        };

        // 6. Back to Top Logic
        const backToTop = document.querySelector('button[aria-label="Back to top"]');
        if (backToTop) {
            window.addEventListener('scroll', () => {
                if (window.scrollY > 500) {
                    backToTop.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-5');
                    backToTop.classList.add('opacity-100', 'pointer-events-auto', 'translate-y-0');
                } else {
                    backToTop.classList.add('opacity-0', 'pointer-events-none', 'translate-y-5');
                    backToTop.classList.remove('opacity-100', 'pointer-events-auto', 'translate-y-0');
                }
            });
            backToTop.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }
    });
  </script>
</body></html>
